<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error — BusGo</title>
    <link rel="stylesheet" th:href="@{/css/api-view.css}" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
</head>
<body>
<div th:replace="~{fragments/view-layout :: background}"></div>
<div class="page-wrapper">
    <nav th:replace="~{fragments/view-layout :: topnav}"></nav>
    <main class="content content-narrow">

        <div class="error-page-card fade-in">
            <div class="error-page-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h1>Something Went Wrong</h1>
            <p class="error-message" th:text="${error}">An error occurred while fetching data.</p>
            <div class="error-details">
                <span class="error-label">Endpoint:</span>
                <code th:text="${endpoint}">/api/...</code>
            </div>
            <div class="error-actions">
                <a th:href="@{/dashboard}" class="btn btn-primary-outline">
                    <i class="fas fa-arrow-left"></i> Back to Dashboard
                </a>
                <button onclick="location.reload()" class="btn btn-primary">
                    <i class="fas fa-redo"></i> Retry
                </button>
            </div>
        </div>

    </main>
    <footer th:replace="~{fragments/view-layout :: footer}"></footer>
</div>
<script th:src="@{/js/view-common.js}"></script>
</body>
</html>
